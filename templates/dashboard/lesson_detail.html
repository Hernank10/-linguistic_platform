{% extends 'base.html' %}
{% block content %}
<div class="container">
    <h1>Lección #{{ lesson_id }} del Curso #{{ course_id }}</h1>
    <p>Contenido de la lección aquí.</p>
    <form method="post" action="{% url 'dashboard:complete_lesson' lesson_id %}">
        {% csrf_token %}
        <button type="submit" class="btn btn-success">Completar Lección</button>
    </form>
    <a href="{% url 'dashboard:course_detail' course_id %}" class="btn btn-secondary">Volver al Curso</a>
</div>
{% endblock %}
